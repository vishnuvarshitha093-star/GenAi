openapi: 3.0.3
info:
  title: Workplace Access & Resource Request Management API
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /api/v1/requests:
    get:
      summary: List requests
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequestResponse'
    post:
      summary: Create request
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestCreate'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestResponse'
  /api/v1/requests/{request_id}:
    patch:
      summary: Edit in Submitted state
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: request_id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestResponse'
  /api/v1/requests/{request_id}/status:
    post:
      summary: Change request status
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: request_id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestStatusUpdate'
      responses:
        '200':
          description: Status changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestResponse'
  /api/v1/requests/exports/csv:
    get: { summary: Export CSV, security: [{ bearerAuth: [] }], responses: { '200': { description: CSV file } } }
  /api/v1/requests/exports/excel:
    get: { summary: Export Excel, security: [{ bearerAuth: [] }], responses: { '200': { description: XLSX file } } }
  /api/v1/requests/exports/pdf:
    get: { summary: Export PDF, security: [{ bearerAuth: [] }], responses: { '200': { description: PDF file } } }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string }
    RequestCreate:
      type: object
      required: [title, description, category]
      properties:
        title: { type: string }
        description: { type: string }
        category: { type: string }
    RequestUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        category: { type: string }
    RequestStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [Submitted, Under Review, Approved, Rejected, Fulfilled, Closed]
    RequestResponse:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        category: { type: string }
        status: { type: string }
        due_date: { type: string, format: date-time }
        requested_by_id: { type: integer }

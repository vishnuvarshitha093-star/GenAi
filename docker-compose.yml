version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workplace
    ports: ["5432:5432"]
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/workplace
    depends_on: [db]
    ports: ["8000:8000"]
  ai-agent:
    build:
      context: .
      dockerfile: streamlit_ui/Dockerfile
    ports: ["8501:8501"]
